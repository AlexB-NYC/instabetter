name: Build extension artifact

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate extension sources and build output
        shell: bash
        run: |
          set -euo pipefail
          npm run validate
          npm test
          npm run build
          npm run validate:extension

      - name: Package unpacked extension
        id: package
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA:0:12}"
          archive="instabetter-${short_sha}.zip"
          (cd dist && zip -r "../$archive" .)

          python3 - "$archive" <<'PY'
          import json
          import sys
          import zipfile
          from pathlib import Path

          archive_path = Path(sys.argv[1])

          with zipfile.ZipFile(archive_path) as archive:
              names = set(name for name in archive.namelist() if not name.endswith("/"))
              if "manifest.json" not in names:
                  raise SystemExit("archive is missing manifest.json")

              manifest = json.loads(archive.read("manifest.json"))
              background = manifest.get("background", {})
              service_worker = background.get("service_worker")
              if service_worker and service_worker not in names:
                  raise SystemExit(f"archive is missing background service worker: {service_worker}")

              for index, entry in enumerate(manifest.get("content_scripts", [])):
                  for kind in ("js", "css"):
                      for path in entry.get(kind, []):
                          if path not in names:
                              raise SystemExit(f"archive is missing content_scripts[{index}].{kind} file: {path}")

          print(f"Verified {archive_path} with {len(names)} files")
          PY

          sha256sum "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload extension ZIP
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.package.outputs.archive }}
          archive: false
          if-no-files-found: error
          retention-days: 30
